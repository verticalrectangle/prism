name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch imgui
        run: |
          rm -rf vendor/imgui
          git clone --depth=1 https://github.com/ocornut/imgui.git vendor/imgui

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libgl-dev libglfw3-dev \
            pkg-config curl unzip

      - name: Install ONNX Runtime
        run: |
          ORT_VERSION=1.20.1
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | tar -xz -C /tmp/
          sudo cp -r /tmp/onnxruntime-linux-x64-${ORT_VERSION}/include/* /usr/include/onnxruntime/
          sudo cp -r /tmp/onnxruntime-linux-x64-${ORT_VERSION}/lib/*      /usr/lib/
          sudo ldconfig

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Bundle HuBERT model
        run: |
          mkdir -p models

          echo "Downloading HuBERT base checkpoint..."
          curl -fsSL -o hubert_base.pt \
            "https://dl.fbaipublicfiles.com/hubert/hubert_base_ls960.pt"

          echo "Exporting full HuBERT to ONNX..."
          ./build/prism-export-hubert hubert_base.pt models/hubert.onnx

          rm -f hubert_base.pt

      - name: Package release
        run: |
          mkdir -p prism-release
          cp build/prism prism-release/prism
          cp -r models    prism-release/models
          tar -czf prism-linux-x86_64.tar.gz prism-release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: prism-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
